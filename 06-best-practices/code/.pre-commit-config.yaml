# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v3.2.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
    - id: check-added-large-files
      args: [--maxkb=20000]
- repo: local
  hooks:
    - id: isort
      name: isort
      entry: pipenv run isort
      language: system
      types: [python]
      pass_filenames: true
- repo: https://github.com/psf/black-pre-commit-mirror
  rev: 22.6.0
  hooks:
    - id: black
      language_version: python3.9
- repo: local
  hooks:
    - id: pylint
      name: pylint
      entry: pylint
      language: system
      types: [python]
      args: [
        "-rn", # Only display messages
        "-sn", # Don't display the score
        "--recursive=y", # Recursively check all files in the project
      ]
- repo: local
  hooks:
    - id: pytest-check
      name: pytest-check
      entry: pytest
      language: system
      pass_filenames: false
      always_run: true
      args: [
        "tests/",
      ]
