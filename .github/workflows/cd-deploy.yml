name: CD Deploy

on:
  push:
    branches:
      - main
    paths:
      - '06-best-practices/code/**'

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-west-1"
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      # Define the infrastructure
      - name: TF plan
        id: tf-plan
        working-directory: '06-best-practices/code/infrastructure'
        run: |
          terraform init -backend-config="bucket=terraform-state-${{ secrets.AWS_ACCOUNT_ID }}" && \
          terraform plan -var-file=vars/prod.tfvars

      - name: TF apply
        id: tf-apply
        working-directory: '06-best-practices/code/infrastructure'
        if: ${{ steps.tf-plan.outputs.changed }} == 'success'
        run: |
          terraform apply -auto-approve -var-file=vars/prod.tfvars
          echo "::set-output name=ecr_repo::$(terraform output -raw ecr_repo | xargs)"
          echo "::set-output name=predictions_stream_name::$(terraform output predictions_stream_name | xargs)"
          echo "::set-output name=model_bucket::$(terraform output model_bucket | xargs)"
          echo "::set-output name=lambda_function::$(terraform output lambda_function | xargs)"

      # Build and push Docker image
      # This will log in to ECR using the AWS credentials from the previous step
      - name: AWS Login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Build, tag, and push Docker image to Amazon ECR
        id: build-image-and-push-step
        working-directory: "06-best-practices/code"
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.tf-apply.outputs.ecr_repo }}
          IMAGE_TAG: "latest" # Can use ${{ github.sha }} for a specific version,
                              # commonly used for blue/green deployments
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # Deploy 
      # The steps here are not suited for production.
      # In practice, retrieving the latest model version or RUN_ID from a service like MLflow 
      # or DVC can also be integrated into a CI/CD pipeline.
      # But due to the limited scope of this workshop, we would be keeping things simple.
      # In practice, you would also have a separate training pipeline to write new model 
      # artifacts to your Model Bucket in Prod.

      - name: Get the latest model artifacts
        id: get-model-artifacts
        working-directory: '06-best-practices/code'
        env:
          MODEL_BUCKET_DEV: "tf-state-mlops-remote433"
          MODEL_BUCKET_PROD: ${{ steps.tf-apply.outputs.model_bucket }}
        run: |
          # export RUN_ID=$(aws s3api list-objects-v2 --bucket $MODEL_BUCKET_DEV --query \
          # "sort_by(Contents, &LastModified)[-1].Key" --output text | cut -f2 -d/)
          export RUN_ID=$(aws s3api list-objects-v2 --bucket "$MODEL_BUCKET_DEV" --query \
          'Contents[?contains(Key, `/artifacts/`)] | sort_by(@, &LastModified)[-1].Key' \
          --output text | sed -E 's|(.*)/artifacts/.*|\1|' | grep -oE '[0-9a-f]{32}' | head -1)
          aws s3 sync s3://$MODEL_BUCKET_DEV s3://$MODEL_BUCKET_PROD

      - name: Update the Lambda function 
        id: update-lambda-function
        working-directory: '06-best-practices/code'
        env:
          LAMBDA_FUNCTION: ${{ steps.tf-apply.outputs.lambda_function }}
          PREDICTIONS_STREAM_NAME: ${{ steps.tf-apply.outputs.predictions_stream_name }}
          MODEL_BUCKET_PROD: ${{ steps.tf-apply.outputs.model_bucket }}
          RUN_ID: ${{ steps.get-model-artifacts.outputs.run_id }}
        run: |
          variables="MODEL_BUCKET=${MODEL_BUCKET_PROD}, PREDICTIONS_STREAM_NAME=${PREDICTIONS_STREAM_NAME}, RUN_ID=${RUN_ID}, \
          TEST_RUN=False" 
          # Wait for the Lambda function to be in the InProgress state
          STATE=$(aws lambda get-function --function-name $LAMBDA_FUNCTION --query 'Configuration.State' --output text)
          while [ "$STATE" != "InProgress" ]; do
            echo "Lambda function is not active, waiting for 5 seconds..."
            sleep 5
            STATE=$(aws lambda get-function --function-name $LAMBDA_FUNCTION --query 'Configuration.State' --output text)
          done
          aws lambda update-function-configuration --function-name $LAMBDA_FUNCTION --environment "Variables=${variables}"

        